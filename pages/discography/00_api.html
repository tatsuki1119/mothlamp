<div id="results"></div>

<img src="" alt="" id="artwork">
<script>
    $(function () {
        const trackId = 1753635656;
        const apiUrl = "https://itunes.apple.com/lookup?lang=ja_jp&country=jp&limit=1&media=music&entity=song&id=" + trackId + "&callback=?";
        $.ajax({
            url: apiUrl,
            dataType: "jsonp",
            success: function (data) {
                if (data.resultCount > 0) {
                    const track = data.results.find(item => item.wrapperType === "track");
                    if (track && track.artworkUrl100) {
                        let artworkUrl = track.artworkUrl100.replace(/\/\d+x\d+.*\.jpg/, "/600x600.jpg");
                        $("#artwork").attr("src", artworkUrl);
                    }
                }
            }
        });
    });

    $(function () {
        const term = "おともだち";
        const apiUrl = "https://itunes.apple.com/search?lang=ja_jp&country=jp&limit=5&media=music&entity=album&term=" + encodeURIComponent(term) + "&callback=?";
        $.ajax({
            url: apiUrl,
            dataType: "jsonp",
            success: function (data) {
                if (data.resultCount > 0) {
                    let html = "<table border='1'><tr><th>画像</th><th>アーティスト</th><th>アルバム名</th><th>発売日</th></tr>";
                    data.results.forEach(function (item) {
                        let img = item.artworkUrl100 ? item.artworkUrl100.replace(/\/\d+x\d+.*\.jpg/, "/100x100.jpg") : "";
                        let date = item.releaseDate ? item.releaseDate.split("T")[0] : "";
                        html += "<tr><td><img src='" + img + "'></td><td>" + item.artistName + "</td><td>" + item.collectionName + "</td><td>" + date + "</td></tr>";
                    });
                    html += "</table>";
                    $("#results").html(html);
                }
            }
        });
    });
</script>
