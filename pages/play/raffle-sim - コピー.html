<style>
    h1 {
        font-size: 1.4rem;
        margin-bottom: 0.2rem;
        color: #ffffff;
    }

    .controls {
        display: flex;
        gap: 8px;
        margin: 10px 0 16px 0;
        align-items: center;
        flex-wrap: wrap;
    }

    button {
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #444;
        background: #1e1e1e;
        color: #eee;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
    }

    button:hover {
        background: #2a2a2a;
    }

    button.primary {
        background: #2b8cff;
        color: #fff;
        border-color: #1f6fd6;
    }

    button.primary:hover {
        background: #1f6fd6;
    }

    button.danger {
        background: #ff5f5f;
        color: #fff;
        border-color: #d64c4c;
    }

    button.danger:hover {
        background: #d64c4c;
    }

    .panel {
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 12px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th,
    td {
        padding: 6px 8px;
        text-align: left;
        border-bottom: 1px solid #333;
    }

    th {
        color: #aaa;
    }

    .progress {
        height: 12px;
        border-radius: 999px;
        overflow: hidden;
    }

    .bar {
        height: 100%;
        background: #2b8cff;
        width: 0;
        transition: width 0.3s ease;
    }

    .history {
        overflow: auto;
        padding: 6px;
        border-radius: 6px;
        border: 1px solid #2a2a2a;
        max-height: 100vh;
    }

    .result-item {
        padding: 8px 10px;
        border-radius: 6px;
        margin: 6px 0;
        border: 1px solid #2a2a2a;
        color: #f0f0f0;
    }

    .flex {
        display: flex;
        gap: 8px;
        align-items: center;
    }

    .right {
        margin-left: auto;
    }

    small {
        color: #999;
    }

    strong {
        color: #fff;
    }

    a {
        color: #2b8cff;
    }

    .gacha-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        backdrop-filter: blur(6px);
    }

    .gacha-modal-content {
        position: relative;
        background: #1a1a1a;
        border-radius: 12px;
        padding: 30px;
        text-align: center;
        border: 1px solid #444;
    }

    #gacha-tier {
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    #gacha-prize {
        font-size: 18px;
        margin-bottom: 20px;
    }

    .gacha-buttons {
        display: flex;
        justify-content: center;
        gap: 10px;
    }

    .flash-layer {
        position: absolute;
        inset: 0;
        opacity: 0;
        pointer-events: none;
        border-radius: 12px;
    }

    /* 共通アニメーション */

    .flash {
        animation: flashAnim 0.6s ease;
    }

    @keyframes flashAnim {
        0% {
            opacity: 1
        }

        100% {
            opacity: 0
        }
    }

    /* A賞 レインボー */

    .flash-a {
        animation:
            rainbowFade 1s linear infinite,
            flashAnim 2s ease-out;
    }

    @keyframes rainbowFade {

        0% {
            background: rgb(255, 0, 0);
        }

        /* red */
        16% {
            background: rgb(255, 165, 0);
        }

        /* orange */
        33% {
            background: rgb(255, 255, 0);
        }

        /* yellow */
        50% {
            background: rgb(0, 255, 0);
        }

        /* lime */
        66% {
            background: rgb(0, 255, 255);
        }

        /* cyan */
        83% {
            background: rgb(0, 0, 255);
        }

        /* blue */
        100% {
            background: rgb(255, 0, 0);
        }

        /* red */
    }

    /* B賞 金 */

    .flash-b {
        background: radial-gradient(circle, #ffd700, #ff8c00);
    }

    /* C賞 白 */

    .flash-c {
        background: white;
    }

    /* D以下 弱い */

    .flash-d {
        background: rgba(255, 255, 255, 0.4);
    }

    .result-card {
        padding: 10px;
        border-radius: 8px;
        margin: 6px 0;
        color: #000;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
    }

    #result-list {
        max-height: 60vh;
        overflow-y: auto;
        padding-right: 4px;
    }
</style>

<div class="contents_block">
    <h1>🎲 ランダムくじ（ガチャ）シミュレーター</h1>
</div>


<div class="panel contents_block">
    <strong>操作</strong>
    <div class="controls">
        <div>
            <button class="draw-btn primary" data-count="1">1回</button>
            <button class="draw-btn primary" data-count="5">5回</button>
            <button class="draw-btn primary" data-count="10">10回</button>
            <button class="draw-btn primary" data-count="30">30回</button>
            <button class="draw-btn primary" data-count="100">100回</button>
        </div>
        <div class="right">
            <button id="show-config">確率・景品を表示</button>
            <button id="reset" class="danger">リセット</button>
        </div>
    </div>

    <div id="last-results"></div>
</div>

<div class="panel contents_block" id="config-panel" style="display:none">
    <strong>🎯 設定</strong>
    <div id="config-list" style="margin-top:8px;"></div>
</div>

<div class="panel contents_block">
    <strong>📊 集計</strong>
    <div id="summary"></div>
</div>

<div class="panel contents_block">
    <strong>🧾 履歴（全件）</strong>
    <div id="history" class="history"></div>
</div>

<div id="result-modal" class="gacha-modal" style="display:none;">
    <div class="gacha-modal-content">

        <div class="flash-layer"></div>
        <div class="shine-layer"></div>

        <div id="gacha-tier"></div>
        <div id="gacha-prize"></div>

        <div class="gacha-buttons">
            <button id="skip-results">全部スキップ</button>
            <button id="next-result" class="primary">次へ</button>
        </div>

    </div>
</div>

<div id="result-list-modal" class="gacha-modal" style="display:none;">
    <div class="gacha-modal-content">

        <div style="display:flex; align-items:center; margin-bottom:10px;">
            <strong style="font-size:20px;">結果一覧</strong>
            <button id="close-result-list" class="right danger">×</button>
        </div>

        <div id="result-list"></div>

    </div>
</div>

<script>
    // ===============================
    // コンフィグ設定部分
    // ===============================
    const GACHA_CONFIG = [
        {
            name: "A賞【直筆宛名＆サイン入り！】写真帖",
            prob: 0.3,
            items: [
                { name: "A-もな" },
                { name: "A-美雨" },
                { name: "A-凛花" },
                { name: "A-百花" },
            ]
        },
        {
            name: "B賞 【直筆サイン入り！】ファントムシータのプリントチェキ",
            prob: 0.5,
            items: [
                { name: "B-もな" },
                { name: "B-美雨" },
                { name: "B-凛花" },
                { name: "B-百花" },
            ]
        },
        {
            name: "C賞 【選べる！】回転アクリルスタンド",
            prob: 8.0,
            items: [
                { name: "C-選べる回転アクスタ" },
            ]
        },
        {
            name: "D賞 カードケース",
            prob: 12.0,
            items: [
                { name: "D-もな" },
                { name: "D-美雨" },
                { name: "D-凛花" },
                { name: "D-百花" },
            ]
        },
        {
            name: "E賞 和紙缶バッジ",
            prob: 19.2,
            items: [
                { name: "E-もな1" },
                { name: "E-もな2" },
                { name: "E-美雨1" },
                { name: "E-美雨2" },
                { name: "E-凛花1" },
                { name: "E-凛花2" },
                { name: "E-百花1" },
                { name: "E-百花2" },
            ]
        },
        {
            name: "F賞 キラキラカード",
            prob: 25.0,
            items: [
                { name: "F-もな1" },
                { name: "F-もな2" },
                { name: "F-美雨1" },
                { name: "F-美雨2" },
                { name: "F-凛花1" },
                { name: "F-凛花2" },
                { name: "F-百花1" },
                { name: "F-百花2" },
            ]
        },
        {
            name: "G賞 ミニブロマイド",
            prob: 35.0,
            items: [
                { name: "G-もな1" },
                { name: "G-もな2" },
                { name: "G-美雨1" },
                { name: "G-美雨2" },
                { name: "G-凛花1" },
                { name: "G-凛花2" },
                { name: "G-百花1" },
                { name: "G-百花2" },
                { name: "G-集合1" },
                { name: "G-集合2" },
            ]
        },
    ];

    const TIER_COLORS = {
        "A賞【直筆宛名＆サイン入り！】写真帖": "#ff3333",
        "B賞 【直筆サイン入り！】ファントムシータのプリントチェキ": "#ffaa00",
        "C賞 【選べる！】回転アクリルスタンド": "#ffff00",
        "D賞 カードケース": "#c9ceb3",
        "E賞 和紙缶バッジ": "#b9ceb3",
        "F賞 キラキラカード": "#afc9c3",
        "G賞 ミニブロマイド": "#cccccc"
    };

    const STORAGE_HISTORY_KEY = 'gacha_history_v2';

    function rnd() { return Math.random(); }
    function getHistory() {
        const raw = localStorage.getItem(STORAGE_HISTORY_KEY);
        if (!raw) return [];
        try { return JSON.parse(raw) || []; } catch { return []; }
    }
    function saveHistory(arr) { localStorage.setItem(STORAGE_HISTORY_KEY, JSON.stringify(arr)); }
    function pushHistory(entry) { const h = getHistory(); h.push(entry); saveHistory(h); }

    function buildTierCDF(config) {
        let total = 0;
        for (const t of config) total += (t.prob || 0);
        let acc = 0;
        return config.map(t => {
            const p = (t.prob || 0) / total;
            const low = acc; acc += p;
            return { ...t, probNormalized: p, cdfLow: low, cdfHigh: acc };
        });
    }

    function chooseItemFromTier(tier) {
        const items = tier.items || [];
        let total = 0;
        for (const it of items) total += (it.weight || 1);
        const r = rnd() * total;
        let acc = 0;
        for (const it of items) {
            acc += (it.weight || 1);
            if (r < acc) return it;
        }
        return items[items.length - 1];
    }

    function drawOnce(cdf) {
        const r = rnd();
        for (const t of cdf) {
            if (r >= t.cdfLow && r < t.cdfHigh) {
                const it = chooseItemFromTier(t);
                return { tierName: t.name, prizeName: it.name };
            }
        }
        const last = cdf[cdf.length - 1];
        const it = chooseItemFromTier(last);
        return { tierName: last.name, prizeName: it.name };
    }

    function aggregateCounts(history) {
        const counts = {};
        for (const h of history) counts[h.prizeName] = (counts[h.prizeName] || 0) + 1;
        return counts;
    }

    // ===============================
    // UI描画
    // ===============================
    function renderConfig() {
        const cdf = buildTierCDF(GACHA_CONFIG);
        const $c = $('#config-list').empty();
        for (const t of cdf) {
            const pct = (t.probNormalized * 100).toFixed(2) + '%';
            const $tier = $(`
                    <div style="margin-bottom:8px;">
                        <strong>${t.name}</strong> <small>（確率: ${pct}）</small>
                        <table style="margin-top:6px;">
                            <thead><tr><th>景品</th><th>重み</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                `);
            for (const it of t.items) {
                const w = (it.weight || 1);
                $tier.find('tbody').append(`<tr><td>${it.name}</td><td>${w}</td></tr>`);
            }
            $c.append($tier);
        }
    }

    function renderSummary() {
        const history = getHistory();
        const counts = aggregateCounts(history);
        const total = history.length;

        const pricePerDraw = 770;
        const shippingPerBatch = 660;

        const drawCost = total * pricePerDraw;
        const shippingCost = total > 0 ? Math.ceil(total / 10) * shippingPerBatch : 0;
        const totalCost = drawCost + shippingCost;

        const $s = $('#summary').empty();
        $s.append(`
        <div style="margin-bottom:8px;">
            <strong>合計ドロー数:</strong> ${total}
            <br>
            <strong>合計金額:</strong> ¥${totalCost.toLocaleString()}
            <small>
                （ガチャ: ¥${drawCost.toLocaleString()} + 送料: ¥${shippingCost.toLocaleString()}）
            </small>
        </div>
    `);


        const cdf = buildTierCDF(GACHA_CONFIG);

        for (const tier of cdf) {
            // ▼ この賞の合計回数を計算
            let tierTotal = 0;
            for (const it of tier.items) {
                tierTotal += counts[it.name] || 0;
            }
            const tierRate = total > 0 ? ((tierTotal / total) * 100).toFixed(2) : '0.00';

            // ▼ 見出しに合計を追加表示
            const tierTitle = $(`
            <div style="margin-top:10px;">
                <strong>${tier.name}</strong>
                <small>（設定確率: ${(tier.probNormalized * 100).toFixed(2)}%）</small><br>
                <small>→ 出現合計: ${tierTotal}回 / 実測: ${tierRate}%</small>
            </div>
        `);

            const $table = $(`<table><thead><tr><th>景品</th><th>回数</th><th>確率</th></tr></thead><tbody></tbody></table>`);
            for (const it of tier.items) {
                const name = it.name;
                const cnt = counts[name] || 0;
                const pct = total > 0 ? ((cnt / total) * 100).toFixed(2) + '%' : '0%';
                const barW = total > 0 ? (cnt / total * 100) : 0;
                const $tr = $(`
                <tr>
                    <td>${name}</td>
                    <td>${cnt}</td>
                    <td style="width:60%">
                        <div class="progress"><div class="bar" style="width:${barW}%"></div></div> ${pct}
                    </td>
                </tr>
            `);
                $table.find('tbody').append($tr);
            }

            $s.append(tierTitle);
            $s.append($table);
        }
    }

    function renderHistory() {
        const h = getHistory();
        const $h = $('#history').empty();
        if (h.length === 0) { $h.append('<div>履歴は空です。</div>'); return; }
        for (const e of h.slice().reverse()) {
            const time = new Date(e.timestamp).toLocaleString();
            $h.append(`<div class="result-item"><div class="flex"><div><strong>${e.prizeName}</strong> <small>（${e.tierName}）</small></div><div class="right"><small>${time}</small></div></div></div>`);
        }
    }

    function renderLastResults(arr) {
        const $d = $('#last-results').empty();
        if (!arr || arr.length === 0) return;
        $d.append('<div><strong>直近の取得</strong></div>');
        for (const r of arr) {
            $d.append(`<div style="display:inline-block;margin:2px;"><div style="font-size:12px;padding:2px 3px;border-radius:2px;background:#222;border:1px solid #eef;"><div><strong>${r.prizeName}</strong></div><div style="font-size:8px;color:#bbb">${r.tierName}</div></div></div>`);
        }
    }

    function performDraws(count) {
        const cdf = buildTierCDF(GACHA_CONFIG);
        const res = [];
        for (let i = 0; i < count; i++) {
            const r = drawOnce(cdf);
            const entry = { timestamp: new Date().toISOString(), tierName: r.tierName, prizeName: r.prizeName };
            pushHistory(entry);
            res.push(entry);
        }
        return res;
    }

    function resetAll() {
        if (!confirm('本当にリセットしますか？')) return;
        localStorage.removeItem(STORAGE_HISTORY_KEY);
        renderSummary(); renderHistory(); renderLastResults([]);
        alert('リセットしました。');
    }

    // 結果演出
    let currentResults = [];
    let currentIndex = 0;

    function showResultModal(results) {
        currentResults = results;
        currentIndex = 0;

        $('#result-modal').show();
        showSingleResult();
    }

    function showSingleResult() {

        const r = currentResults[currentIndex];

        $('#gacha-tier').text(r.tierName);
        $('#gacha-prize').text(r.prizeName);

        const color = TIER_COLORS[r.tierName] || "#fff";
        $('#gacha-tier').css("color", color);

        playEffect(r.tierName);
    }

    $('#next-result').on('click', function () {

        currentIndex++;

        if (currentIndex >= currentResults.length) {
            $('#result-modal').hide();
            showResultList(currentResults);
            return;
        }

        showSingleResult();

    });

    $('#skip-results').on('click', function () {

        $('#result-modal').hide();
        showResultList(currentResults);

    });

    function playEffect(tierName) {

        const flash = $('.flash-layer');

        // クラス削除
        flash.removeClass('flash flash-a flash-b flash-c flash-d');

        // アニメーションリセット（重要）
        flash[0].offsetWidth;

        // クラス追加
        if (tierName.startsWith("A賞")) {
            flash.addClass('flash flash-a');
        }
        else if (tierName.startsWith("B賞")) {
            flash.addClass('flash flash-b');
        }
        else if (tierName.startsWith("C賞")) {
            flash.addClass('flash flash-c');
        }
        else {
            flash.addClass('flash flash-d');
        }

    }

    // 結果表示
    function showResultList(results) {

        const list = $('#result-list');
        list.empty();

        for (const r of results) {

            const color = TIER_COLORS[r.tierName] || "#666";

            list.append(`
            <div class="result-card" style="background:${color}">
                <div>${r.tierName}</div>
                <div>${r.prizeName}</div>
            </div>
        `);

        }

        $('#result-list-modal').show();

    }

    $('#close-result-list').on('click', function () {

        $('#result-list-modal').hide();

    });



    // ===============================
    // 初期化
    // ===============================
    $(function () {
        renderConfig();
        renderSummary();
        renderHistory();

        $('.draw-btn').on('click', function () {
            const n = parseInt($(this).data('count'));
            const results = performDraws(n);
            renderSummary();
            renderHistory();
            renderLastResults(results.slice(-10).reverse());

            // 🎯 抽選結果をアラート表示
            const msg = results.map(r => `・${r.prizeName}（${r.tierName}）`).join('\n');
            showResultModal(results);
        });

        $('#show-config').on('click', function () {
            $('#config-panel').toggle();
            $(this).text($('#config-panel').is(':visible') ? '確率を隠す' : '確率・景品を表示');
        });

        $('#reset').on('click', resetAll);
    });
</script>
</body>

</html>
