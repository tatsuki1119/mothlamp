<div id="page-title" style="display: none;">セットリスト [誘蛾灯の導き]</div>
<div id="page-description" style="display: none;">ファントムシータのライブのセトリ（セットリスト）を記載しています。This page contains the setlist for
    Phantom Siita's live performances.</div>

<style>
    .setlist-anchor {
        display: block;
        padding-top: calc(25px + var(--safeareainsettop));
        margin-top: calc(-25px - var(--safeareainsettop));
    }

    .music_link_img {
        display: inline-block;
        margin: 0 5px;
        height: 0.9em;
        filter: brightness(0) saturate(100%) invert(18%) sepia(100%) saturate(5000%) hue-rotate(350deg) brightness(100%) contrast(100%);
    }
</style>

<div class="contents_block">
    <h1 class="glitch-text">セットリスト</h1>
</div>

<div class="contents_block">
    <h3>目次</h3>
    <ul id="setlist-index" class="anchor-list"></ul>
</div>

<div id="setlist-container"></div>

<div class="contents_block">
    <h3>お願い</h3>
    <p>公式から発表のない公演については、会場の皆様からの情報により作成しています。抜けや間違いなどありましたら、本サイトのお問い合わせ、もしくは管理人までご連絡をいただけると助かります。
    </p>
</div>


<!-- 
Phantom Siita 1st WORLD TOUR “Moth to a flame”

[2025.01.21 シンガポール Capitol Theatre] 会場変更
[2025.01.23 クアラルンプール Zepp Kuala Lumpur] 中止
[2025.02.03 ヒューストン Smart Financial Center] 会場変更/日付変更 
-->


<script>
    $(function () {

        $.getJSON("/pages/data/setlist-data.json", function (data) {

            const songsMaster = data.songs;
            const lives = data.lives;

            const index = $("#setlist-index");
            const container = $("#setlist-container");

            lives.forEach(function (live) {

                index.append(
                    `<li><a href="#${live.id}">${live.title}</a></li>`
                );

                let html = `
            <div class="contents_block">
                <h4 class="setlist-anchor" id="${live.id}">
                    ${live.title}
                </h4>
            `;

                live.sections.forEach(function (sec) {

                    if (sec.schedule) {
                        sec.schedule.forEach(function (s) {
                            html += `<p>[${s}]</p>`;
                        });
                    }

                    html += `<ul class="butterfly-list">`;

                    sec.songs.forEach(function (song) {

                        let name = "";
                        let hasId = false;
                        let songId = "";

                        if (typeof song === "string") {

                            name = song;

                        } else {

                            if (song.id && !songsMaster[song.id]) {
                                console.error(
                                    `setlist-data.json: 未定義の曲ID "${song.id}"`,
                                    {
                                        live: live.id,
                                        title: live.title,
                                        song: song
                                    }
                                );
                            }

                            name =
                                song.display ??
                                songsMaster[song.id] ??
                                "";

                            if (song.id) {
                                hasId = true;
                                songId = song.id;
                            }
                        }

                        if (hasId) {
                            html += `
        <li>
            <p>
                ${name}
                <a href="?p=discography.${songId}">
                    <img src="/static/img/icon/note.png" alt="note" class="music_link_img">
                </a>
            </p>
        </li>
        `;
                        } else {
                            html += `
        <li>
            <p>${name}</p>
        </li>
        `;
                        }

                    });
                });

                html += `</div>`;

                container.append(html);

            });

        });

    });
</script>
